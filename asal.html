 <body class="h-full gradient-bg overflow-auto">
  <div id="app" class="w-full min-h-full p-4 md:p-8">
   <!-- Header -->
   <div class="text-center mb-8">

    </div>
    <p class="text-pink-500 text-sm">ثبت و مدیریت نوبت مشتریان</p>
   </div><!-- Form -->
   <div class="max-w-lg mx-auto glass rounded-2xl p-6 shadow-lg border border-pink-100 mb-8">

     <div>
      <label for="name" class="block text-sm font-500 text-pink-800 mb-1">نام مشتری</label> <input type="text" id="name" required placeholder="مثلا: سارا احمدی" class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition bg-white/70">

     </div>

       <label for="date" class="block text-sm font-500 text-pink-800 mb-1">تاریخ (شمسی)</label> <input type="text" id="date" required placeholder="۱۴۰۴/۰۳/۱۵" class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition bg-white/70">
      </div>
      <div>
       <label for="time" class="block text-sm font-500 text-pink-800 mb-1">ساعت</label> <input type="time" id="time" required class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition bg-white/70">
      </div>
     </div>
     <div>
      <label for="service" class="block text-sm font-500 text-pink-800 mb-1">نوع خدمات</label> <select id="service" required class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition bg-white/70"> <option value="">انتخاب کنید...</option> <option value="کاشت ناخن">کاشت ناخن</option> <option value="لاک ژل">لاک ژل</option> <option value="مانیکور">مانیکور</option> <option value="پدیکور">پدیکور</option> <option value="ترمیم ناخن">ترمیم ناخن</option> <option value="طراحی ناخن">طراحی ناخن</option> <option value="سایر">سایر</option> </select>
     </div><button type="submit" id="submit-btn" class="w-full py-3 bg-pink-600 hover:bg-pink-700 text-white font-700 rounded-xl transition shadow-md hover:shadow-lg flex items-center justify-center gap-2"> <i data-lucide="plus-circle" style="width:20px;height:20px;"></i> ثبت نوبت </button>

    <div id="form-message" class="mt-3 text-center text-sm hidden"></div>
   </div><!-- Appointments List -->
   <div class="max-w-2xl mx-auto">
    <h2 class="text-xl font-700 text-pink-700 mb-4 flex items-center gap-2"><i data-lucide="calendar" style="width:22px;height:22px;"></i> لیست نوبت‌ها <span id="count-badge" class="text-xs bg-pink-100 text-pink-600 px-2 py-0.5 rounded-full">۰</span></h2>
    <div id="appointments-list" class="space-y-3">
     <div id="empty-state" class="text-center py-12 text-pink-400">
      <span class="text-5xl block mb-3">📋</span>
      <p>هنوز نوبتی ثبت نشده</p>
     </div>
    </div>
    <div id="limit-warning" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm text-center">
     ⚠️ تعداد نوبت‌ها به حداکثر رسیده. لطفاً برخی را حذف کنید.

  <script>
    // Shamsi date helper (manual implementation)
    function gregorianToShamsi(gy, gm, gd) {
      const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
      let gy2 = (gm > 2) ? (gy + 1) : gy;
      let days = 355666 + (365 * gy) + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) + gd + g_d_m[gm - 1];
      let jy = -1595 + (33 * Math.floor(days / 12053));
      days %= 12053;
      jy += 4 * Math.floor(days / 1461);
      days %= 1461;
      if (days > 365) { jy += Math.floor((days - 1) / 365); days = (days - 1) % 365; }
      let jm, jd;
      if (days < 186) { jm = 1 + Math.floor(days / 31); jd = 1 + (days % 31); }
      else { days -= 186; jm = 7 + Math.floor(days / 30); jd = 1 + (days % 30); }
      return { jy, jm, jd };
    }

    function getTodayShamsi() {
      const now = new Date();
      const s = gregorianToShamsi(now.getFullYear(), now.getMonth() + 1, now.getDate());
      return `${s.jy}/${String(s.jm).padStart(2,'۰'.length > 1 ? '0' : '0')}/${String(s.jd).padStart(2,'0')}`;
    }

    function toPersianNum(str) {
      const pn = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
      return String(str).replace(/\d/g, d => pn[d]);
    }

    // Set today's date as placeholder
    document.getElementById('date').placeholder = toPersianNum(getTodayShamsi());

    // Data
    let appointments = [];
    let deleteConfirmId = null;

    // Data SDK
    const dataHandler = {
      onDataChanged(data) {
        appointments = data;
        renderList();
      }
    };

    async function initApp() {
      const result = await window.dataSdk.init(dataHandler);
      if (!result.isOk) {
        showMessage('خطا در اتصال به سرور', 'red');
      }
    }
    initApp();

    // Form
    const form = document.getElementById('appointment-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (appointments.length >= 999) {
        document.getElementById('limit-warning').classList.remove('hidden');
        return;
      }
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="animate-pulse">در حال ثبت...</span>';

      const record = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        date: document.getElementById('date').value.trim(),
        time: document.getElementById('time').value,
        service: document.getElementById('service').value,
        created_at: new Date().toISOString()
      };

      const result = await window.dataSdk.create(record);
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="plus-circle" style="width:20px;height:20px;"></i> ثبت نوبت';
      lucide.createIcons();

      if (result.isOk) {
        form.reset();
        showMessage('✅ نوبت با موفقیت ثبت شد', 'green');
      } else {
        showMessage('❌ خطا در ثبت نوبت', 'red');
      }
    });

    function showMessage(text, color) {
      const msg = document.getElementById('form-message');
      msg.textContent = text;
      msg.className = `mt-3 text-center text-sm text-${color}-600`;
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 3000);
    }

    function parseDate(dateStr) {
      // dateStr format: YYYY/MM/DD
      const [y, m, d] = dateStr.split('/').map(Number);
      return { y, m, d };
    }

    function parseTime(timeStr) {
      // timeStr format: HH:MM
      const [h, min] = timeStr.split(':').map(Number);
      return { h, min };
    }

    function formatTimeWithPeriod(timeStr) {
      // Convert 24-hour time to 12-hour with AM/PM
      const [h, min] = timeStr.split(':').map(Number);
      const period = h >= 12 ? 'ب‌ع' : 'ق‌ب';
      const hour12 = h % 12 || 12;
      return `${String(hour12).padStart(2, '0')}:${String(min).padStart(2, '0')} ${period}`;
    }

    function compareDates(apt1, apt2) {
      const d1 = parseDate(apt1.date);
      const d2 = parseDate(apt2.date);
      
      // Compare year
      if (d1.y !== d2.y) return d1.y - d2.y;
      
      // Compare month
      if (d1.m !== d2.m) return d1.m - d2.m;
      
      // Compare day
      if (d1.d !== d2.d) return d1.d - d2.d;
      
      // Same date, compare time (hour first, then minute)
      const t1 = parseTime(apt1.time);
      const t2 = parseTime(apt2.time);
      
      if (t1.h !== t2.h) return t1.h - t2.h;
      return t1.min - t2.min;
    }

    function renderList() {
      const container = document.getElementById('appointments-list');
      const empty = document.getElementById('empty-state');
      const badge = document.getElementById('count-badge');
      badge.textContent = toPersianNum(appointments.length);

      if (appointments.length === 0) {
        container.innerHTML = '';
        container.appendChild(createEmptyState());
        return;
      }

      // Sort by date and time (nearest first)
      const sorted = [...appointments].sort((a, b) => compareDates(a, b));

      const existingMap = new Map([...container.children].map(el => [el.dataset.id, el]));
      const fragment = document.createDocumentFragment();

      sorted.forEach(apt => {
        const id = apt.__backendId;
        let el = existingMap.get(id);
        if (el) {
          updateCard(el, apt);
          existingMap.delete(id);
        } else {
          el = createCard(apt);
        }
        fragment.appendChild(el);
      });

      existingMap.forEach(el => el.remove());
      container.innerHTML = '';
      container.appendChild(fragment);
    }

    function createEmptyState() {
      const div = document.createElement('div');
      div.id = 'empty-state';
      div.className = 'text-center py-12 text-pink-400';
      div.innerHTML = '<span class="text-5xl block mb-3">📋</span><p>هنوز نوبتی ثبت نشده</p>';
      return div;
    }

    function createCard(apt) {
      const div = document.createElement('div');
      div.dataset.id = apt.__backendId;
      div.className = 'glass rounded-xl p-4 border border-pink-100 card-hover';
      updateCard(div, apt);
      return div;
    }

    function updateCard(el, apt) {
      const isConfirming = deleteConfirmId === apt.__backendId;
      const formattedTime = formatTimeWithPeriod(apt.time);
      el.innerHTML = `
        <div class="flex justify-between items-start gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-700 text-pink-800">${esc(apt.name)}</span>
              <span class="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">${esc(apt.service)}</span>
            </div>
            <div class="flex flex-wrap gap-3 text-sm text-pink-600">
              <span>📅 ${esc(apt.date)}</span>
              <span>🕐 ${esc(formattedTime)}</span>
              <span>📱 ${esc(apt.phone)}</span>
            </div>
          </div>
          <div class="flex-shrink-0">
            ${isConfirming ? `
              <div class="flex gap-1">
                <button onclick="confirmDelete('${apt.__backendId}')" class="px-3 py-1.5 bg-red-500 text-white text-xs rounded-lg hover:bg-red-600 transition">حذف</button>
                <button onclick="cancelDelete()" class="px-3 py-1.5 bg-gray-200 text-gray-700 text-xs rounded-lg hover:bg-gray-300 transition">لغو</button>
              </div>
            ` : `
              <button onclick="requestDelete('${apt.__backendId}')" class="p-2 text-pink-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition">
                <i data-lucide="trash-2" style="width:18px;height:18px;"></i>
              </button>
            `}
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    window.requestDelete = function(id) {
      deleteConfirmId = id;
      renderList();
    };

    window.cancelDelete = function() {
      deleteConfirmId = null;
      renderList();
    };

    window.confirmDelete = async function(id) {
      const apt = appointments.find(a => a.__backendId === id);
      if (!apt) return;
      const result = await window.dataSdk.delete(apt);
      deleteConfirmId = null;
      if (!result.isOk) showMessage('❌ خطا در حذف', 'red');
    };

    // Element SDK
    const defaultConfig = {
      page_title: 'نوبت‌دهی ناخن',
      background_color: '#fdf2f8',
      surface_color: '#ffffff',
      text_color: '#9d174d',
      primary_action_color: '#db2777',
      secondary_action_color: '#a855f7',
      font_family: 'Vazirmatn',
      font_size: 16
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const title = config.page_title || defaultConfig.page_title;
        document.getElementById('main-title').textContent = title;

        const bg = config.background_color || defaultConfig.background_color;
        document.getElementById('app').style.background = bg;

        const text = config.text_color || defaultConfig.text_color;
        document.getElementById('main-title').style.color = text;

        const primary = config.primary_action_color || defaultConfig.primary_action_color;
        document.getElementById('submit-btn').style.backgroundColor = primary;

        const font = config.font_family || defaultConfig.font_family;
        document.body.style.fontFamily = `${font}, Vazirmatn, sans-serif`;

        const size = config.font_size || defaultConfig.font_size;
        document.body.style.fontSize = `${size}px`;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ["page_title", config.page_title || defaultConfig.page_title]
      ])
    });

    lucide.createIcons();
  </script>
